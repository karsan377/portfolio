<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta - Karthik Sankaran</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../global.js" type="module"></script>
</head>
<body>
    <h1>Meta Analysis</h1>
    <p>This page displays statistics about the codebase of this portfolio.</p>

    <div id="time-filter">
        <label>
            Show commits until:
            <input id="commit-progress" type="range" min="0" max="100" value="100" />
            <time id="commit-time"></time>
        </label>
    </div>

    <div id="stats"></div>

    <h2>Commits by time of day</h2>

    <div id="scrolly-1">
        <div id="scatter-story">Scroll to explore how this repo evolved over time.</div>
        <div id="scatter-plot">
            <div id="chart"></div>

            <p id="selection-count">No commits selected</p>
            <dl id="language-breakdown" class="stats"></dl>
        </div>
    </div>

    <dl id="commit-tooltip" class="info tooltip" hidden>
        <dt>Commit</dt>
        <dd>
            <a href="" id="commit-link" target="_blank"></a>
        </dd>

        <dt>Date</dt>
        <dd id="commit-date-tooltip"></dd>
        
        <dt>Time</dt>
        <dd id="commit-time-tooltip"></dd>

        <dt>Author</dt>
        <dd id="commit-author"></dd>

        <dt>Lines</dt>
        <dd id="commit-lines"></dd>
    </dl>

    <dl id="files"></dl>

    <script src="main.js" type="module"></script>
</body>
</html>
